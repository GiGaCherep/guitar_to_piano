<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Найденные аккорды</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎵 Аккорды из песни</h1>
        <p><a href="{{ url }}" target="_blank" rel="noopener noreferrer">{{ url }}</a></p>

        {% if chords %}
        <h2>Уникальные аккорды ({{ chords|length }}):</h2>
        <div class="chords-list">
            {% for chord in chords %}
            <span class="chord-badge">{{ chord }}</span>
            {% endfor %}
        </div>
        {% else %}
        <p>Не удалось найти аккорды. Попробуйте другой URL.</p>
        {% endif %}

        <a href="/" class="btn">🔙 На главную</a>
    </div>
</body>
</html>
